# manifest.yaml — 데이터셋 선언 (구조는 고정, 라벨은 자유)
#
# 필수 4개 필드:
attribute: helmet                 # 평가할 속성명 (자유 — 내장 프리셋: gender | vehicle_type | military)
n: 2                              # 라벨된 크롭 수
created: "2026-07-02"             # 생성일
source_note: "예시 템플릿 — 실제 출처/수집 방법을 적으세요"

# --- generic 속성일 때 필수 (내장 프리셋이면 생략 가능) ---
labels: [helmet, no_helmet]       # 허용 라벨 집합 (validate가 이 집합으로 검사)
pred_path: attributes.equipment[0].type   # PLR JSON에서 예측값을 뽑는 경로 (dots + [idx])

