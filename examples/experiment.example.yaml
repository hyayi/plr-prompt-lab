# experiment.example.yaml — PLR prompt-lab experiment matrix definition
#
# Run with:
#   python3 lab.py experiment run examples/experiment.example.yaml
#
# The runner enumerates the CROSS-PRODUCT of all axes and for each cell:
#   (a) run  — re_score (PLR re-scoring) with the cell's model/prompt/format/reason
#   (b) eval — score predictions vs labels and append a record to the ledger
#
# A cell that errors is logged and skipped; all other cells continue running.
# Final exit code: 0=all ok, 1=some failed (--strict), 2=all failed.

# --- Axes (all required except attributes, ledger) ---

datasets:
  - ./datasets/gender_v1      # path to a dataset directory (absolute or relative to this file)
  # - ./datasets/vehicle_v1   # add more dataset dirs to sweep

models:
  - mock                      # GPU-free MockModel (for testing / CI)
  # - gemma                   # real LabGemmaModel (requires GPU + model weights)

prompts:
  - plr_v1.4_cot              # pre-forced-commit baseline
  - plr_v1.5_cot              # forced-commit (no unknown) — the standing A/B

pipelines:
  - plr                       # attribute extraction pipeline (re_score → run_eval)

attributes:
  - gender                    # PLR attribute: gender | vehicle_type | military
  # - vehicle_type            # add more attributes to sweep

# --- Optional ---

ledger: ./eval/ledger.jsonl   # ledger path (default: eval/ledger.jsonl relative to lab root)

# Env axes (plr cells only). Cells stamp the axis into the ledger version tag
# (e.g. plr_v1.4_cot+reason-off) so the report can tell them apart.
# formats:                    # IR_PLR_FORMAT — yaml | json. NOTE: conflicts
#   - yaml                    #   loudly with a yaml-backed prompt version that
#   - json                    #   pins a different format (see EXPERIMENT_SPEC).
# reasons:                    # IR_PLR_REASON — "on" | "off" (KEEP THE QUOTES:
#   - "on"                    #   bare on/off parse as YAML booleans and are
#   - "off"                   #   rejected by validation).
