# schema/vocab.yaml — PLR 도메인 어휘의 단일 원천 (one file = one vocabulary version)
#
# plr_schema.py가 이 파일을 로드해 모든 파생물(모듈 상수, 그룹 조회 함수,
# JSON 검증 스키마)을 생성한다. 소비자 4곳이 전부 여기서 파생된 같은 어휘를 본다:
#   1) 프롬프트 주입(plr_prompts / provider의 {colors} 등)   — 모델 입력
#   2) 응답 파서 정규화(parse_plr_response / _coerce_topk_*)  — 모델 출력
#   3) 검색 하드게이트의 그룹 매핑(scoring)                    — core/ir
#   4) 저장값·쿼리 사전과의 계약                               — core/ir DB
# 어휘를 바꾸면 위 넷이 함께 움직인다 — 그래서 이 파일이 단일 원천이어야 한다.
#
# 값의 역사적 근거(왜 이 값이 있는지/빠졌는지)는 git log와 plr_schema.py의
# 함수 docstring, prompts/*.yaml 헤더 주석을 참조.
enums:
  color: [black, dark_gray, gray, light_gray, white, silver, red, orange, yellow, brown, dark_brown, beige,
    cream, gold, blue, navy, light_blue, green, dark_green, military_olive, purple, pink, mixed_pattern,
    multi_color]
  gender: [male, female]
  age_group: [adult, child]
  outfit_type: [two_piece, one_piece, layered, obscured]
  upper_type: [jacket, coat, padding, windbreaker, vest, cardigan, tshirt, long_sleeve_tee, shirt, blouse,
    hoodie, sweater, knit, uniform, safety_vest, workwear, dress, one_piece_uniform, jumpsuit, upper_unknown]
  lower_type: [pants, jeans, training_pants, slacks, leggings, shorts, skirt, long_skirt, none, lower_unknown]
  lower_shape: [long_pants, shorts, long_skirt, short_skirt, none, lower_unknown]
  # sleeveless: 쿼리 매핑(나시/민소매→sleeveless)은 배선돼 있으나 추출 프롬프트는
  # 아직 <long|short>만 제시 — 프롬프트가 제시할 때까지 dormant (deploy_2026 4차 복원).
  upper_sleeve: [long, short, sleeveless, unknown]
  equip_location: [head, eye, face, back, hand]
  equipment_type: [backpack, shoulder_bag, handbag, cross_bag, cart, umbrella, helmet, construction_helmet,
    hat, mask, glasses, sunglasses, headphones, phone_in_hand, handheld_object, bottle, clipboard, knife,
    firearm, bat_stick, sharp_object, cane, stroller, other_equipment]
  static_action: [standing, walking_like, running_like, sitting, bending, squatting, lying_or_fallen_candidate,
    using_phone, carrying_object, pushing_or_pulling, riding_motorcycle, riding_bicycle, riding_scooter,
    riding_kickboard, posture_unknown]
  vehicle_type: [sedan, suv, hatchback, light_car, van, minivan, pickup_truck, truck, bus, taxi, ambulance,
    police_car, fire_truck, emergency_vehicle, motorcycle, scooter, bicycle, kickboard, construction_vehicle,
    vehicle_unknown]
  military: [military, civilian, unknown]
groups:
  color_group:
    dark: [black, dark_gray, dark_brown, dark_green, military_olive]
    light_white: [white, cream, beige]
    metallic_light: [silver, light_gray]
    vivid: [red, orange, yellow, green, purple, pink, gold]
    blue: [blue, navy, light_blue]
    neutral: [gray, brown]
  color_hard_group:
    black: [black, dark_gray]
    gray: [gray]
    white: [white, cream, beige]
    silver: [silver, light_gray]
    red: [red]
    orange: [orange]
    yellow: [yellow, gold]
    brown: [brown, dark_brown]
    green: [green, dark_green]
    blue: [blue, navy, light_blue]
    purple: [purple]
    pink: [pink]
    military_olive: [military_olive]
  upper_type_group:
    upper_outerwear: [jacket, coat, padding, windbreaker, vest, cardigan]
    upper_top: [tshirt, long_sleeve_tee, shirt, blouse, hoodie, sweater, knit]
    uniform_like: [uniform, safety_vest, workwear]
