# parser/qp_v0.4.yaml
# Surface-form synonym tables for the qp_v0.4 query parser.
#
# Each table maps lowercase surface forms (Korean and English) to the
# canonical English enum value used in QueryJSON required/excluded slots.
#
# IMPORTANT: This file externalises ONLY the synonym surface forms.
# COLOR_ENUM and all other enum definitions remain in plr_schema.py.
# Do NOT add enum definitions here.

